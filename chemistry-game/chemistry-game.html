<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学问答游戏</title>
<script src="chem-data-v2.js"></script>
<script src="chem-equations-v2.js"></script>
<script src="chem-puzzles-v2.js"></script>
<script src="chem-symbols-v2.js"></script>
<style>
:root {
  --bg: #0a0e17; --surface: #111827; --surface2: #1a2235;
  --cyan: #06b6d4; --cyan2: #22d3ee; --magenta: #d946ef;
  --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --text: #e2e8f0; --text2: #94a3b8; --border: #1e293b;
  --gold: #fbbf24; --radius: 12px; --glass: rgba(17,24,39,0.75);
  --cat-alkali: #f97316; --cat-alkaline: #eab308;
  --cat-transition: #ef4444; --cat-poor: #22c55e;
  --cat-metalloid: #06b6d4; --cat-nonmetal: #8b5cf6;
  --cat-halogen: #ec4899; --cat-noble: #6366f1;
  --cat-lanthanide: #14b8a6; --cat-actinide: #f43f5e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:12px}
header{text-align:center;padding:20px 0 10px}
h1{font-size:clamp(1.5rem,4vw,2.2rem);background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.subtitle{color:var(--text2);font-size:0.9rem;margin-top:4px}
.top-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin:8px 0}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:0.85rem;display:flex;align-items:center;gap:6px}
.stat-pill .icon{font-size:1rem}.stat-pill .val{font-weight:700;color:var(--cyan2)}
.combo-badge{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#000;border-radius:20px;padding:4px 12px;font-weight:800;font-size:0.8rem;animation:pulse 0.5s ease;display:none}
.combo-badge.show{display:inline-block}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.diff-selector{display:flex;gap:4px;background:var(--surface2);border-radius:20px;padding:3px}
.diff-btn{border:none;background:transparent;color:var(--text2);padding:5px 12px;border-radius:17px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;font-weight:600}
.diff-btn.active{background:var(--cyan);color:#000}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin:12px 0}
.mode-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.mode-card:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 32px rgba(6,182,212,0.15)}
.mode-card .mode-icon{font-size:2rem;margin-bottom:8px}
.mode-card .mode-name{font-weight:700;font-size:1rem;margin-bottom:4px}
.mode-card .mode-desc{font-size:0.75rem;color:var(--text2)}
.mode-card.new-badge{position:relative}
.mode-card.new-badge::after{content:'NEW';position:absolute;top:8px;right:8px;background:var(--magenta);color:#fff;font-size:0.6rem;font-weight:800;padding:2px 6px;border-radius:8px}
.game-area{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:12px 0;display:none}
.game-area.active{display:block}
.game-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.game-header h2{font-size:1.2rem;color:var(--cyan2)}
.game-header .timer{font-size:1.1rem;font-weight:700;color:var(--amber)}
.game-header .timer.urgent{color:var(--red);animation:pulse 0.5s ease infinite}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--magenta));border-radius:2px;transition:width 0.3s}
.question-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;text-align:center;transition:all 0.3s}
.question-card.correct{border-color:var(--green);box-shadow:0 0 20px rgba(16,185,129,0.3);animation:flashGreen 0.5s}
.question-card.wrong{border-color:var(--red);box-shadow:0 0 20px rgba(239,68,68,0.3);animation:shake 0.5s}
@keyframes flashGreen{0%,100%{background:var(--surface2)}50%{background:rgba(16,185,129,0.15)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.q-text{font-size:1.1rem;font-weight:600;margin-bottom:12px;line-height:1.5}
.q-formula{font-size:2rem;font-weight:800;color:var(--cyan);margin:8px 0;letter-spacing:2px}
.options-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);cursor:pointer;font-size:0.9rem;transition:all 0.2s;text-align:center}
.opt-btn:hover{background:var(--surface2);border-color:var(--cyan)}
.opt-btn.selected{background:rgba(6,182,212,0.2);border-color:var(--cyan)}
.opt-btn.correct{background:rgba(16,185,129,0.2);border-color:var(--green)}
.opt-btn.wrong{background:rgba(239,68,68,0.2);border-color:var(--red)}
.opt-btn:disabled{cursor:default;opacity:0.7}
.feedback-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:2rem;font-weight:900;pointer-events:none;z-index:100;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275)}
.feedback-toast.show{transform:translate(-50%,-50%) scale(1)}
.feedback-toast.correct{color:var(--green)}.feedback-toast.wrong{color:var(--red)}
.answer-reveal{text-align:center;margin-top:10px;padding:10px;background:var(--surface);border-radius:8px;font-size:0.85rem;color:var(--text2)}
.answer-reveal .correct-ans{color:var(--green);font-weight:700}
.answer-reveal .hint{color:var(--amber)}
.result-screen{text-align:center;padding:20px}
.result-screen .big-score{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-screen .xp-gain{color:var(--amber);font-size:1.1rem;margin:8px 0}
.result-stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.result-stat{background:var(--surface2);border-radius:12px;padding:12px 20px;text-align:center}
.result-stat .num{font-size:1.5rem;font-weight:800;color:var(--cyan2)}
.result-stat .lbl{font-size:0.75rem;color:var(--text2)}
.btn{background:linear-gradient(135deg,var(--cyan),#0891b2);color:#000;border:none;padding:10px 24px;border-radius:20px;font-weight:700;cursor:pointer;font-size:0.9rem;transition:all 0.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(6,182,212,0.3)}
.btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:linear-gradient(135deg,var(--red),#dc2626)}
.btn.small{padding:6px 14px;font-size:0.8rem}
.periodic-table-wrap{overflow-x:auto;margin:10px 0}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;min-width:600px}
.pt-el{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.55rem;cursor:pointer;transition:all 0.15s;position:relative;border:1px solid transparent;min-width:28px}
.pt-el:hover{transform:scale(1.2);z-index:10;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.pt-el .sym{font-weight:800;font-size:0.7rem}
.pt-el .num{font-size:0.45rem;color:var(--text2)}
.pt-el.highlight{border-color:var(--gold);box-shadow:0 0 8px rgba(251,191,36,0.5)}
.pt-el.dim{opacity:0.3}
.pt-search{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pt-search input{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;color:var(--text);font-size:0.85rem}
.pt-search input:focus{outline:none;border-color:var(--cyan)}
.pt-legend{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;font-size:0.7rem}
.pt-legend span{padding:2px 8px;border-radius:10px;font-weight:600}
.element-popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
.element-popup.show{display:flex}
.popup-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:380px;width:90%;position:relative}
.popup-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer}
.popup-el-sym{font-size:3rem;font-weight:900;text-align:center}
.popup-el-name{text-align:center;font-size:1.2rem;color:var(--text2)}
.popup-props{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.popup-prop{background:var(--surface2);padding:8px;border-radius:8px}
.popup-prop .prop-lbl{font-size:0.7rem;color:var(--text2)}
.popup-prop .prop-val{font-weight:700;font-size:0.85rem}
.stats-page{display:none}
.stats-page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:12px 0}
.stats-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stats-card h3{font-size:0.9rem;color:var(--text2);margin-bottom:8px}
.stats-card .stat-val{font-size:2rem;font-weight:900;color:var(--cyan2)}
.stats-card .stat-sub{font-size:0.75rem;color:var(--text2)}
.level-bar{height:6px;background:var(--border);border-radius:3px;margin:8px 0;overflow:hidden}
.level-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--magenta));border-radius:3px;transition:width 0.5s}
.achievement{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin:4px 0}
.achievement.locked{opacity:0.5}
.achievement .ach-icon{font-size:1.5rem}
.achievement .ach-info{flex:1}
.achievement .ach-name{font-weight:700;font-size:0.85rem}
.achievement .ach-desc{font-size:0.7rem;color:var(--text2)}
.daily-challenge{background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(245,158,11,0.1));border:1px solid var(--gold);border-radius:var(--radius);padding:16px;margin:12px 0;text-align:center}
.daily-challenge h3{color:var(--gold)}
.daily-challenge .dc-reward{font-size:0.8rem;color:var(--text2)}
.score-popup{position:fixed;pointer-events:none;z-index:150;font-weight:900;font-size:1.2rem;animation:scoreUp 1s ease-out forwards}
@keyframes scoreUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes floatIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.mode-card,.game-area{animation:floatIn 0.4s ease}
.nav-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:20px;padding:3px;margin:8px 0;overflow-x:auto}
.nav-tab{border:none;background:transparent;color:var(--text2);padding:6px 14px;border-radius:17px;cursor:pointer;font-size:0.8rem;white-space:nowrap;font-weight:600}
.nav-tab.active{background:var(--cyan);color:#000}
@media(max-width:600px){
  .mode-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .mode-card{padding:12px}
  .options-grid{grid-template-columns:1fr 1fr}
  .pt-grid{grid-template-columns:repeat(18,1fr);font-size:0.4rem}
  .pt-el .sym{font-size:0.5rem}.pt-el .num{font-size:0.35rem}
  .result-stats{flex-direction:column}
  h1{font-size:1.3rem}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="container">
  <header>
    <h1>化学问答游戏</h1>
    <div class="subtitle">⚗️ 探索化学元素的奇妙世界</div>
  </header>
  <div class="top-bar">
    <div class="stat-pill"><span class="icon">⭐</span>Lv.<span class="val" id="levelNum">1</span></div>
    <div class="stat-pill"><span class="icon">✨</span><span class="val" id="xpNum">0</span> XP</div>
    <div class="stat-pill"><span class="icon">🔥</span>连击:<span class="val" id="comboNum">0</span></div>
    <div class="combo-badge" id="comboBadge">🔥 x3!</div>
    <div class="diff-selector" id="diffSelector">
      <button class="diff-btn" data-diff="easy">简单</button>
      <button class="diff-btn active" data-diff="medium">中等</button>
      <button class="diff-btn" data-diff="hard">困难</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="play">🎮 游戏</button>
    <button class="nav-tab" data-tab="ptable">📊 周期表</button>
    <button class="nav-tab" data-tab="stats">📈 统计</button>
    <button class="nav-tab" data-tab="achievements">🏆 成就</button>
  </div>
  <!-- 主游戏视图 -->
  <div id="playView">
    <div class="mode-grid" id="modeGrid"></div>
    <div class="daily-challenge" id="dailyChallenge">
      <h3>🎯 每日挑战</h3>
      <p id="dcDesc"></p>
      <p class="dc-reward">奖励: <span id="dcReward"></span> XP</p>
      <button class="btn" onclick="startDailyChallenge()">开始挑战</button>
    </div>
    <div class="game-area" id="gameArea"></div>
  </div>
  <!-- 周期表视图 -->
  <div id="ptableView" style="display:none">
    <div class="pt-search">
      <input type="text" id="ptSearch" placeholder="搜索元素名称或符号..." oninput="filterPT()">
      <button class="btn small secondary" onclick="resetPT()">重置</button>
    </div>
    <div class="pt-legend" id="ptLegend"></div>
    <div class="periodic-table-wrap"><div class="pt-grid" id="ptGrid"></div></div>
  </div>
  <!-- 统计视图 -->
  <div class="stats-page" id="statsView">
    <div class="stats-grid" id="statsGrid"></div>
    <div style="margin-top:12px">
      <h3 style="font-size:0.9rem;color:var(--text2);margin-bottom:8px">📊 各模式准确率</h3>
      <div id="modeAccuracy"></div>
    </div>
  </div>
  <!-- 成就视图 -->
  <div id="achievementsView" style="display:none">
    <div id="achievementsList"></div>
  </div>
</div>
<div class="feedback-toast" id="feedbackToast"></div>
<div class="element-popup" id="elementPopup"><div class="popup-content" id="popupContent"></div></div>
<script>
// ── 工具函数 ──
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr,n=1){let s=shuffle([...arr]);return n===1?s[0]:s.slice(0,n)}

// ── 状态管理 ──
let state={
  xp:0,level:1,combo:0,maxCombo:0,difficulty:'medium',
  currentMode:null,currentTab:'play',gameActive:false,
  questionIndex:0,totalQuestions:10,score:0,correctCount:0,
  timerSec:0,timerInterval:null,timedMode:false,
  stats:{compound:{total:0,correct:0},equation:{total:0,correct:0},puzzle:{total:0,correct:0},symbol:{total:0,correct:0},elementmaster:{total:0,correct:0},reactionspeed:{total:0,correct:0},molecule:{total:0,correct:0}},
  achievements:{},dailyDone:false
};
function loadState(){try{let s=JSON.parse(localStorage.getItem('chemgame'));if(s){Object.assign(state,s);state.timerInterval=null;state.gameActive=false}}catch(e){}}
function saveState(){let s={...state};s.timerInterval=null;s.gameActive=false;localStorage.setItem('chemgame',JSON.stringify(s))}
function addXP(n){let mul=state.difficulty==='hard'?2:state.difficulty==='easy'?0.5:1;n=Math.round(n*mul);state.xp+=n;updateXPUI();saveState()}
function xpForLevel(l){return Math.floor(100*Math.pow(l,1.5))}
function updateXPUI(){$('xpNum').textContent=state.xp;let lvl=1;while(state.xp>=xpForLevel(lvl))lvl++;lvl--;if(lvl!==state.level){state.level=lvl;$('levelNum').textContent=lvl;showToast('🎉','升级! Lv.'+lvl,'correct')}$('levelNum').textContent=state.level;let lf=$('levelFill');if(lf){let cur=xpForLevel(lvl),nxt=xpForLevel(lvl+1),pct=Math.min(100,Math.round((state.xp-cur)/(nxt-cur)*100));lf.style.width=pct+'%'}}
function updateCombo(correct){if(correct){state.combo++;if(state.combo>state.maxCombo)state.maxCombo=state.combo;$('comboNum').textContent=state.combo;if(state.combo>=3&&state.combo%3===0){$('comboBadge').textContent='🔥 x'+state.combo+'!';$('comboBadge').classList.add('show');setTimeout(()=>$('comboBadge').classList.remove('show'),1500)}}else{state.combo=0;$('comboNum').textContent='0'}}
function showToast(icon,msg,type){let t=$('feedbackToast');t.textContent=icon+' '+msg;t.className='feedback-toast '+type+' show';setTimeout(()=>t.classList.remove('show'),1200)}
function showScorePopup(x,y,text,color){let el=document.createElement('div');el.className='score-popup';el.textContent=text;el.style.cssText=`left:${x}px;top:${y}px;color:${color}`;document.body.appendChild(el);setTimeout(()=>el.remove(),1000)}
function getDifficultyConfig(){let d=state.difficulty;return{questions:d==='easy'?8:d==='hard'?15:10,timePerQ:d==='easy'?20:d==='hard'?8:12,options:d==='easy'?3:4}}

// ── 粒子背景 ──
function initParticles(){let c=$('particles'),ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;let ps=[];for(let i=0;i<60;i++){ps.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*3+1,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5-0.5,o:Math.random()*0.5+0.3})}function anim(){ctx.clearRect(0,0,c.width,c.height);for(let p of ps){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(6,182,212,${p.o})`;ctx.fill()}requestAnimationFrame(anim)}anim();window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight})}

// ── 导航 ──
function switchTab(tab){state.currentTab=tab;['playView','ptableView','statsView','achievementsView'].forEach(id=>$(id).style.display='none');let map={play:'playView',ptable:'ptableView',stats:'statsView',achievements:'achievementsView'};$(map[tab]).style.display='block';document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));if(tab==='ptable')renderPT();if(tab==='stats')renderStats();if(tab==='achievements')renderAchievements()}
$('navTabs').addEventListener('click',e=>{if(e.target.classList.contains('nav-tab'))switchTab(e.target.dataset.tab)});

// ── 难度选择 ──
$('diffSelector').addEventListener('click',e=>{if(e.target.classList.contains('diff-btn')){document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');state.difficulty=e.target.dataset.diff;saveState()}});

// ── 游戏模式 ──
function initModes(){let modes=[
  {id:'compound',icon:'🧪',name:'化合物匹配',desc:'看化学式选名称',new:false},
  {id:'equation',icon:'⚖️',name:'方程式配平',desc:'配平化学方程式',new:false},
  {id:'puzzle',icon:'🔍',name:'物质推断',desc:'根据描述推断物质',new:false},
  {id:'symbol',icon:'🔤',name:'符号速记',desc:'看符号写元素名',new:false},
  {id:'elementmaster',icon:'🧬',name:'元素大师',desc:'根据属性猜元素',new:true},
  {id:'reactionspeed',icon:'⚡',name:'反应速度',desc:'限时快速答题',new:true},
  {id:'molecule',icon:'🔬',name:'分子构建',desc:'选择原子构建分子',new:true},
];
let html='';modes.forEach(m=>{html+=`<div class="mode-card${m.new?' new-badge':''}" onclick="startGame('${m.id}')"><div class="mode-icon">${m.icon}</div><div class="mode-name">${m.name}</div><div class="mode-desc">${m.desc}</div></div>`});$('modeGrid').innerHTML=html}

// ── 开始游戏 ──
function startGame(modeId){if(state.gameActive)return;state.currentMode=modeId;state.gameActive=true;state.questionIndex=0;state.score=0;state.correctCount=0;state.combo=0;state.timedMode=(modeId==='reactionspeed');let cfg=getDifficultyConfig();state.totalQuestions=cfg.questions;state.timerSec=state.timedMode?cfg.timePerQ:0;let area=$('gameArea');area.style.display='block';area.classList.add('active');area.scrollIntoView({behavior:'smooth'});renderGameQuestion()}
function stopGame(){state.gameActive=false;if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}let area=$('gameArea');area.style.display='none';area.classList.remove('active')}
function endGame(){let area=$('gameArea');let acc=state.totalQuestions>0?Math.round(state.correctCount/state.totalQuestions*100):0;let xpEarn=Math.round(state.score*2+state.maxCombo*5);addXP(xpEarn);checkAchievements();let mode=state.currentMode;if(state.stats[mode]){state.stats[mode].total+=state.totalQuestions;state.stats[mode].correct+=state.correctCount}saveState();let html=`<div class="result-screen"><div class="big-score">${state.score} 分</div><div class="xp-gain">+${xpEarn} XP</div><div class="result-stats"><div class="result-stat"><div class="num">${acc}%</div><div class="lbl">正确率</div></div><div class="result-stat"><div class="num">${state.correctCount}/${state.totalQuestions}</div><div class="lbl">正确/总数</div></div><div class="result-stat"><div class="num">🔥 ${state.maxCombo}</div><div class="lbl">最大连击</div></div></div><button class="btn" onclick="stopGame();initModes();switchTab('play')">返回</button> <button class="btn secondary" onclick="startGame(state.currentMode)">再来一局</button></div>`;area.innerHTML=html;area.style.display='block';state.gameActive=false;if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}}

// ── 渲染题目 ──
function renderGameQuestion(){if(state.questionIndex>=state.totalQuestions){endGame();return}let cfg=getDifficultyConfig();let area=$('gameArea');let mode=state.currentMode;let qData=generateQuestion(mode);let progressPct=Math.round(state.questionIndex/state.totalQuestions*100);let html=`<div class="game-header"><h2>${getModeName(mode)}</h2><span>${state.questionIndex+1}/${state.totalQuestions}</span>${state.timedMode?`<span class="timer" id="qtimer">⏱ ${state.timerSec}s</span>`:''}</div><div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div><div class="question-card" id="qcard">${qData.html}</div>`;area.innerHTML=html;if(state.timedMode){state.timerSec=cfg.timePerQ;updateTimer();state.timerInterval=setInterval(()=>{state.timerSec--;updateTimer();if(state.timerSec<=0){clearInterval(state.timerInterval);state.timerInterval=null;handleTimeout()}},1000)}}
function updateTimer(){let t=$('qtimer');if(!t)return;t.textContent='⏱ '+state.timerSec+'s';if(state.timerSec<=5)t.classList.add('urgent');else t.classList.remove('urgent')}
function handleTimeout(){state.combo=0;$('comboNum').textContent='0';state.questionIndex++;showToast('⏰','超时!','wrong');renderGameQuestion()}
function getModeName(mode){let map={compound:'🧪 化合物匹配',equation:'⚖️ 方程式配平',puzzle:'🔍 物质推断',symbol:'🔤 符号速记',elementmaster:'🧬 元素大师',reactionspeed:'⚡ 反应速度',molecule:'🔬 分子构建'};return map[mode]||mode}

// ── 题目生成 ──
function generateQuestion(mode){
  let cfg=getDifficultyConfig();
  if(mode==='compound'){
    let correct=pick(COMPOUNDS);
    let wrongs=pick(COMPOUNDS.filter(c=>c.n!==correct.n),cfg.options-1);
    let opts=shuffle([correct,...wrongs]);
    return {correct:correct.n,html:`<div class="q-text">这个化学式对应的名称是什么？</div><div class="q-formula">${correct.f}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o.n)}','${esc(correct.n)}',this)">${o.n}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='equation'){
    let eq=pick(EQUATIONS);
    let lhs=eq.r.map((r,i)=>`<span class="sym">${eq.e[i]||''}${r}</span>`).join(' + ');
    let rhs=eq.p.map((p,i)=>`<span class="sym">${eq.e[eq.r.length+i]||''}${p}</span>`).join(' + ');
    let correctCoeff=eq.e.join(',');
    let wrongs=[];for(let i=0;i<cfg.options-1;i++){let w=[...eq.e];for(let j=0;j<w.length;j++)w[j]=Math.max(1,w[j]+randInt(-2,2));if(w.join(',')!==correctCoeff)wrongs.push(w.join(','))}
    let opts=shuffle([correctCoeff,...wrongs.slice(0,cfg.options-1)]);
    return {correct:correctCoeff,html:`<div class="q-text">配平: ${eq.h}</div><div class="q-formula">${lhs} → ${rhs}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(correctCoeff)}',this)">${o}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='puzzle'){
    let p=pick(PUZZLES);
    let opts=shuffle([p.correct,...pick(p.opts.filter(o=>o!==p.correct),cfg.options-1)]);
    return {correct:p.correct,html:`<div class="q-text">${p.desc}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(p.correct)}',this)">${o}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='symbol'){
    let el=pick(ALL_EL);
    let wrongs=pick(ALL_EL.filter(e=>e.name!==el.name),cfg.options-1);
    let opts=shuffle([el,...wrongs]);
    return {correct:el.name,html:`<div class="q-text">这个化学符号对应的元素名称是什么？</div><div class="q-formula">${el.s}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o.name)}','${esc(el.name)}',this)">${o.name}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='elementmaster'){
    let keys=Object.keys(ELEMENT_PROPS);
    let sym=pick(keys);
    let el=ALL_EL.find(e=>e.s===sym);
    let ep=ELEMENT_PROPS[sym];
    let wrongs=pick(keys.filter(k=>k!==sym),cfg.options-1);
    let wrongNames=wrongs.map(w=>{let e=ALL_EL.find(x=>x.s===w);return e?e.name:w});
    let opts=shuffle([el.name,...wrongNames]);
    let qType=randInt(0,4);
    let qText='';
    if(qType===0)qText=`哪种元素的原子序数是 <b>${el.n}</b>？`;
    else if(qType===1)qText=`哪种元素的相对原子质量约为 <b>${ep.mass}</b>？`;
    else if(qType===2)qText=`哪种元素属于 <b>${el.cat}</b>，电子排布为 <b>${ep.ec}</b>？`;
    else if(qType===3)qText=`哪种元素的电负性约为 <b>${ep.en}</b>，常温下为<b>${ep.phase}</b>？`;
    else qText=`哪种元素的主要用途是：<b>${ep.use}</b>？`;
    return {correct:el.name,html:`<div class="q-text">🔬 ${qText}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(el.name)}',this)">${o}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='reactionspeed'){
    let types=['compound','equation','puzzle','symbol'];
    let t=types[randInt(0,3)];
    if(t==='compound'){let c=pick(COMPOUNDS);let w=pick(COMPOUNDS.filter(x=>x.n!==c.n),2);let opts=shuffle([c.n,...w.map(x=>x.n)]);return {correct:c.n,html:`<div class="q-text">⚡ <span class="q-formula">${c.f}</span> 的名称是？</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(c.n)}',this)">${o}</button>`).join('')}</div>`,type:'choice'}}
    if(t==='symbol'){let el=pick(ALL_EL);let w=pick(ALL_EL.filter(e=>e.name!==el.name),2);let opts=shuffle([el.name,...w.map(x=>x.name)]);return {correct:el.name,html:`<div class="q-text">⚡ <span class="q-formula">${el.s}</span> 是什么元素？</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(el.name)}',this)">${o}</button>`).join('')}</div>`,type:'choice'}}
    if(t==='puzzle'){let p=pick(PUZZLES);let opts=shuffle([p.correct,...pick(p.opts.filter(o=>o!==p.correct),2)]);return {correct:p.correct,html:`<div class="q-text">⚡ ${p.desc}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(p.correct)}',this)">${o}</button>`).join('')}</div>`,type:'choice'}}
    let eq=pick(EQUATIONS);let lhs=eq.r.map((r,i)=>`<span class="sym">${eq.e[i]||''}${r}</span>`).join(' + ');let rhs=eq.p.map((p,i)=>`<span class="sym">${eq.e[eq.r.length+i]||''}${p}</span>`).join(' + ');let cc=eq.e.join(',');let wrongs=[];for(let i=0;i<3;i++){let w=[...eq.e];for(let j=0;j<w.length;j++)w[j]=Math.max(1,w[j]+randInt(-2,2));if(w.join(',')!==cc)wrongs.push(w.join(','))}let opts=shuffle([cc,...wrongs.slice(0,2)]);return {correct:cc,html:`<div class="q-text">⚡ 配平: ${eq.h}</div><div class="q-formula">${lhs} → ${rhs}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(cc)}',this)">${o}</button>`).join('')}</div>`,type:'choice'};
  }
  if(mode==='molecule'){
    let molecules=[{name:'水 H₂O',atoms:[{s:'H',n:2},{s:'O',n:1}],desc:'2个氢原子 + 1个氧原子'},
    {name:'二氧化碳 CO₂',atoms:[{s:'C',n:1},{s:'O',n:2}],desc:'1个碳原子 + 2个氧原子'},
    {name:'硫酸 H₂SO₄',atoms:[{s:'H',n:2},{s:'S',n:1},{s:'O',n:4}],desc:'2个氢 + 1个硫 + 4个氧'},
    {name:'碳酸钠 Na₂CO₃',atoms:[{s:'Na',n:2},{s:'C',n:1},{s:'O',n:3}],desc:'2个钠 + 1个碳 + 3个氧'},
    {name:'氯化钠 NaCl',atoms:[{s:'Na',n:1},{s:'Cl',n:1}],desc:'1个钠原子 + 1个氯原子'},
    {name:'氨 NH₃',atoms:[{s:'N',n:1},{s:'H',n:3}],desc:'1个氮原子 + 3个氢原子'},
    {name:'甲烷 CH₄',atoms:[{s:'C',n:1},{s:'H',n:4}],desc:'1个碳原子 + 4个氢原子'},
    {name:'氢氧化钠 NaOH',atoms:[{s:'Na',n:1},{s:'O',n:1},{s:'H',n:1}],desc:'1个钠 + 1个氧 + 1个氢'},
    {name:'硝酸 HNO₃',atoms:[{s:'H',n:1},{s:'N',n:1},{s:'O',n:3}],desc:'1个氢 + 1个氮 + 3个氧'},
    {name:'乙醇 C₂H₅OH',atoms:[{s:'C',n:2},{s:'H',n:6},{s:'O',n:1}],desc:'2个碳 + 6个氢 + 1个氧'},
    ];
    let mol=pick(molecules);
    let atomList=mol.atoms.map(a=>`${a.n}×${a.s} (${ALL_EL.find(e=>e.s===a.s)?.name||a.s})`).join(' · ');
    let wrongs=pick(molecules.filter(m=>m.name!==mol.name),cfg.options-1);
    let opts=shuffle([mol.name,...wrongs.map(m=>m.name)]);
    return {correct:mol.name,html:`<div class="q-text">🔬 构建这个分子：<b>${mol.desc}</b></div><div style="font-size:0.85rem;color:var(--text2);margin:6px 0">原子组成: ${atomList}</div><div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="answerQuestion('${esc(o)}','${esc(mol.name)}',this)">${o}</button>`).join('')}</div>`,type:'choice'};
  }
  return {correct:'',html:'<div class="q-text">题目加载失败</div>',type:'choice'};
}
function esc(s){return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}

// ── 答题处理 ──
function answerQuestion(chosen,correct,btnEl){
  if(!state.gameActive)return;
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}
  let isCorrect=chosen===correct;
  let card=$('qcard');if(!card)return;
  let allBtns=card.querySelectorAll('.opt-btn');
  allBtns.forEach(b=>{b.disabled=true;if(b.textContent.trim()===correct)b.classList.add('correct');if(b===btnEl&&!isCorrect)b.classList.add('wrong')});
  if(isCorrect){
    state.score+=10+state.combo*2;state.correctCount++;card.classList.add('correct');
    showToast('✅','正确!','correct');
    if(state.combo>=5)showScorePopup(window.innerWidth/2,window.innerHeight/2,'+'+state.combo*2,'#fbbf24');
  }else{card.classList.add('wrong');showToast('❌','错误','wrong')}
  updateCombo(isCorrect);
  setTimeout(()=>{state.questionIndex++;renderGameQuestion()},isCorrect?600:1200);
}

// ── 周期表 ──
let catColors={'碱金属':'#f97316','碱土金属':'#eab308','过渡金属':'#ef4444','贫金属':'#22c55e','类金属':'#06b6d4','非金属':'#8b5cf6','卤素':'#ec4899','稀有气体':'#6366f1','镧系':'#14b8a6','锕系':'#f43f5e','未知':'#64748b'};
function renderPT(){
  let grid=$('ptGrid');grid.innerHTML='';
  for(let row=1;row<=10;row++){for(let col=1;col<=18;col++){let el=ALL_EL.find(e=>e.row===row&&e.col===col);if(el){let color=catColors[el.cat]||'#64748b';grid.innerHTML+=`<div class="pt-el" style="background:${color}22;border-color:${color}44" data-sym="${el.s}" onclick="showElementDetail('${el.s}')"><span class="num">${el.n}</span><span class="sym">${el.s}</span></div>`}else{grid.innerHTML+='<div class="pt-el" style="visibility:hidden"></div>'}}}
  let legend=$('ptLegend');legend.innerHTML='';Object.entries(catColors).forEach(([cat,color])=>{legend.innerHTML+=`<span style="background:${color}22;color:${color}">${cat}</span>`})}
}
function showElementDetail(sym){
  let el=ALL_EL.find(e=>e.s===sym);if(!el)return;
  let ep=ELEMENT_PROPS[sym]||{};
  let html=`<button class="popup-close" onclick="closeElementPopup()">✕</button><div class="popup-el-sym" style="color:${catColors[el.cat]||'#64748b'}">${el.s}</div><div class="popup-el-name">${el.name} · 原子序数 ${el.n}</div><div class="popup-props">
    <div class="popup-prop"><div class="prop-lbl">分类</div><div class="prop-val">${el.cat}</div></div>
    <div class="popup-prop"><div class="prop-lbl">原子量</div><div class="prop-val">${ep.mass||'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">电负性</div><div class="prop-val">${ep.en||'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">电子排布</div><div class="prop-val" style="font-size:0.7rem">${ep.ec||'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">常见氧化态</div><div class="prop-val">${ep.ox?ep.ox.join(', '):'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">常温状态</div><div class="prop-val">${ep.phase||'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">族/周期</div><div class="prop-val">${ep.group||'—'} / ${ep.period||'—'}</div></div>
    <div class="popup-prop"><div class="prop-lbl">发现年份</div><div class="prop-val">${ep.year||'—'}</div></div>
  </div><div class="popup-prop" style="margin-top:8px"><div class="prop-lbl">主要用途</div><div class="prop-val" style="font-size:0.8rem">${ep.use||'—'}</div></div>`;
  $('popupContent').innerHTML=html;$('elementPopup').classList.add('show')
}
function closeElementPopup(){$('elementPopup').classList.remove('show')}
$('elementPopup').addEventListener('click',e=>{if(e.target===$('elementPopup'))closeElementPopup()});
function filterPT(){let q=$('ptSearch').value.toLowerCase();document.querySelectorAll('.pt-el').forEach(el=>{if(!el.dataset.sym)return;let e=ALL_EL.find(x=>x.s===el.dataset.sym);if(!e)return;let match=e.name.includes(q)||e.s.toLowerCase().includes(q)||String(e.n).includes(q);el.classList.toggle('dim',!match);el.classList.toggle('highlight',match&&q.length>0)})}
function resetPT(){$('ptSearch').value='';document.querySelectorAll('.pt-el').forEach(el=>{el.classList.remove('dim','highlight')})}

// ── 统计 ──
function renderStats(){
  let totalQ=0,totalC=0;Object.values(state.stats).forEach(s=>{totalQ+=s.total;totalC+=s.correct});
  let acc=totalQ>0?Math.round(totalC/totalQ*100):0;
  let html=`<div class="stats-card"><h3>📊 总正确率</h3><div class="stat-val">${acc}%</div><div class="stat-sub">${totalC}/${totalQ} 题</div></div>
    <div class="stats-card"><h3>⭐ 等级</h3><div class="stat-val">Lv.${state.level}</div><div class="stat-sub">${state.xp} XP</div><div class="level-bar"><div class="level-fill" id="levelFill" style="width:${Math.min(100,Math.round((state.xp-xpForLevel(state.level))/(xpForLevel(state.level+1)-xpForLevel(state.level))*100))}%"></div></div></div>
    <div class="stats-card"><h3>🔥 最佳连击</h3><div class="stat-val">${state.maxCombo}</div><div class="stat-sub">连续正确</div></div>
    <div class="stats-card"><h3>🎮 总游戏数</h3><div class="stat-val">${Object.values(state.stats).reduce((a,s)=>a+(s.total>0?1:0),0)}</div><div class="stat-sub">种模式</div></div>`;
  $('statsGrid').innerHTML=html;
  let modeNames={compound:'化合物匹配',equation:'方程式配平',puzzle:'物质推断',symbol:'符号速记',elementmaster:'元素大师',reactionspeed:'反应速度',molecule:'分子构建'};
  let accHtml='';Object.entries(modeNames).forEach(([k,v])=>{let s=state.stats[k]||{total:0,correct:0};let a=s.total>0?Math.round(s.correct/s.total*100):0;accHtml+=`<div class="stats-card"><h3>${v}</h3><div class="stat-val">${a}%</div><div class="stat-sub">${s.correct}/${s.total}</div></div>`});
  $('modeAccuracy').innerHTML=`<div class="stats-grid">${accHtml}</div>`
}

// ── 成就 ──
let ACHIEVEMENTS=[
  {id:'first_win',name:'初次胜利',desc:'首次完成一局游戏',icon:'🎉',check:()=>Object.values(state.stats).some(s=>s.total>0)},
  {id:'combo5',name:'连击大师',desc:'达到5连击',icon:'🔥',check:()=>state.maxCombo>=5},
  {id:'combo10',name:'连击之王',desc:'达到10连击',icon:'💥',check:()=>state.maxCombo>=10},
  {id:'score100',name:'百分达人',desc:'单局得分超过100',icon:'💯',check:()=>state.score>=100},
  {id:'perfect',name:'完美主义',desc:'一局全部正确',icon:'🌟',check:()=>state.totalQuestions>0&&state.correctCount===state.totalQuestions},
  {id:'level5',name:'成长之路',desc:'达到5级',icon:'📈',check:()=>state.level>=5},
  {id:'level10',name:'化学专家',desc:'达到10级',icon:'🏆',check:()=>state.level>=10},
  {id:'all_modes',name:'全能选手',desc:'在所有7种模式中都玩过',icon:'🎯',check:()=>{let modes=['compound','equation','puzzle','symbol','elementmaster','reactionspeed','molecule'];return modes.every(m=>(state.stats[m]||{total:0}).total>0)}},
  {id:'xp1000',name:'经验丰富',desc:'累计获得1000 XP',icon:'✨',check:()=>state.xp>=1000},
  {id:'daily7',name:'每日打卡',desc:'完成每日挑战',icon:'📅',check:()=>state.dailyDone},
];
function checkAchievements(){ACHIEVEMENTS.forEach(a=>{if(a.check()&&!state.achievements[a.id]){state.achievements[a.id]=true;showToast('🏆','解锁成就: '+a.name,'correct');saveState()}})}
function renderAchievements(){
  let html='';ACHIEVEMENTS.forEach(a=>{let unlocked=state.achievements[a.id];html+=`<div class="achievement${unlocked?'':' locked'}"><div class="ach-icon">${unlocked?a.icon:'🔒'}</div><div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div></div>`});
  $('achievementsList').innerHTML=html
}

// ── 每日挑战 ──
function updateDaily(){
  let today=new Date().toDateString();
  let dcDesc='完成10道混合化学题';
  let dcReward=150;
  $('dcDesc').textContent=dcDesc;$('dcReward').textContent=dcReward;
  let stored=localStorage.getItem('chemgame_daily');
  if(stored===today){$('dailyChallenge').style.opacity='0.6';$('dailyChallenge').querySelector('.btn').textContent='今日已完成 ✓';$('dailyChallenge').querySelector('.btn').disabled=true}
}
function startDailyChallenge(){
  let today=new Date().toDateString();
  let stored=localStorage.getItem('chemgame_daily');
  if(stored===today)return;
  localStorage.setItem('chemgame_daily',today);
  state.dailyDone=true;state.currentMode='reactionspeed';state.gameActive=true;state.questionIndex=0;state.totalQuestions=10;state.score=0;state.correctCount=0;state.combo=0;state.timedMode=true;state.timerSec=12;
  let area=$('gameArea');area.style.display='block';area.classList.add('active');area.scrollIntoView({behavior:'smooth'});renderGameQuestion();
  addXP(150);saveState();checkAchievements();updateDaily()
}

// ── 初始化 ──
function init(){
  loadState();
  document.querySelectorAll('.diff-btn').forEach(b=>{b.classList.toggle('active',b.dataset.diff===state.difficulty)});
  $('levelNum').textContent=state.level;$('xpNum').textContent=state.xp;$('comboNum').textContent='0';
  initParticles();initModes();updateDaily();updateXPUI();renderPT();
}
init();
